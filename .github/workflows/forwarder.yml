name: Antes do Sino - Encaminhador de Canais

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-forwarder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # <--- CRÍTICO: Resolve o erro de falta de histórico local

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar encaminhador
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TARGET_CHAT_ID: ${{ secrets.TARGET_CHAT_ID }}
          SOURCE_CHANNEL_1: ${{ secrets.SOURCE_CHANNEL_1 }}
          SOURCE_CHANNEL_2: ${{ secrets.SOURCE_CHANNEL_2 }}
        run: python main.py

      - name: Salvar estado
        run: |
          git config --global user.name "antes-do-sino-bot"
          git config --global user.email "bot@antesdosino.local"
          git add forwarder_state.json
          
          # Verifica se há alterações reais no ficheiro de estado
          if ! git diff --staged --quiet; then
            git commit -m "Atualiza estado do encaminhador"
            # Puxa as suas alterações manuais do GitHub e une de forma segura
            git pull origin main --no-rebase
            git push origin main
          else
            echo "Nenhum post novo para salvar. Pulando push."
          fi
